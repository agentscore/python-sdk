name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  osv-scan:
    name: Dependency Scan
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    steps:
      - uses: useblacksmith/checkout@v1

      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_arm64 -o osv-scanner
          chmod +x osv-scanner

      - name: Scan dependencies
        run: ./osv-scanner scan source --lockfile=uv.lock --format=table

  pip-audit:
    name: Python Audit
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    steps:
      - uses: useblacksmith/checkout@v1
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: |
          uv export --format requirements-txt --no-hashes > requirements.txt
          pip-audit -r requirements.txt --disable-pip --no-deps

