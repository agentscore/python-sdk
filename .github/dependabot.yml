version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    labels: ["dependencies", "python"]
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"

  - package-ecosystem: "github-actions"
